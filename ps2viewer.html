<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayStation 2 Memory Card Visualizer</title>
    
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-space: #070814;
        --panel-glass: rgba(255, 255, 255, 0.03);
        --panel-border: rgba(255, 255, 255, 0.08);
        --panel-border-hover: rgba(255, 255, 255, 0.2);
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --accent-cyan: #00f2fe;
        --accent-blue: #4facfe;
        --accent-neon: #39ff14;
        --glow-default: rgba(0, 242, 254, 0.2);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-space);
        color: var(--text-primary);
        font-family: "Outfit", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        background-image: 
          radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.12) 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.08) 0%, transparent 60%);
        background-attachment: fixed;
      }

      /* Ambient Floating Dust Grid */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.2;
        pointer-events: none;
        z-index: 0;
      }

      #ui-container {
        position: relative;
        z-index: 1;
        width: 95%;
        max-width: 1200px;
        margin: 40px auto;
        padding: 20px;
      }

      header {
        text-align: center;
        margin-bottom: 40px;
      }

      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 2.8rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #ffffff 30%, var(--accent-cyan) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 12px;
        filter: drop-shadow(0 2px 10px rgba(0, 242, 254, 0.2));
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
      }

      h1 span.controller-icon {
        font-size: 2.5rem;
        background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      header p {
        color: var(--text-secondary);
        font-size: 1.1rem;
        font-weight: 300;
        max-width: 600px;
        margin: 0 auto;
        line-height: 1.6;
      }

      /* Drag & Drop Zone Styling */
      .upload-zone {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 2px dashed rgba(0, 242, 254, 0.3);
        padding: 60px 40px;
        border-radius: 24px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(10px);
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4), 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
        margin-bottom: 40px;
      }

      .upload-zone:hover {
        border-color: var(--accent-cyan);
        background: rgba(0, 242, 254, 0.03);
        box-shadow: 
          inset 0 0 20px rgba(0, 242, 254, 0.05),
          0 0 30px rgba(0, 242, 254, 0.15),
          0 10px 30px rgba(0, 0, 0, 0.5);
        transform: translateY(-2px);
      }

      .upload-icon {
        font-size: 3.5rem;
        margin-bottom: 20px;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulseGlow 3s infinite ease-in-out;
      }

      .upload-zone h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.4rem;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .upload-zone p {
        color: var(--text-secondary);
        font-size: 0.95rem;
        font-weight: 300;
      }

      /* Card Overview Dashboard */
      .card-dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
        animation: fadeIn 0.6s ease;
      }

      .stat-card {
        background: var(--panel-glass);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 20px;
        backdrop-filter: blur(16px);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
        opacity: 0.8;
      }

      .stat-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 500;
      }

      .stat-value {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.6rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .stat-detail {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-top: 4px;
      }

      .progress-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 10px;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        transition: width 1s ease-in-out;
      }

      /* Card Grid Browser */
      .card-browser {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 30px;
        margin-top: 20px;
        perspective: 1000px;
      }

      /* Save Game Card */
      .save-card {
        background: var(--panel-glass);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 24px;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        cursor: pointer;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 280px;
        backdrop-filter: blur(12px);
        transform-style: preserve-3d;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .save-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 20px;
        padding: 1px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* Dynamic Neon Glow on Hover */
      .save-card:hover {
        transform: translateY(-8px) scale(1.03) rotateX(3deg) rotateY(3deg);
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--card-glow, var(--accent-cyan));
        box-shadow: 
          0 15px 35px rgba(0, 0, 0, 0.6),
          0 0 20px var(--card-glow, var(--glow-default));
      }

      /* Cartridge Disc Mock Visual */
      .card-header-visual {
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .disc-visual {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 0, 0, 0.8) 15%, var(--card-glow, var(--accent-blue)) 45%, rgba(0,0,0,0.9) 70%);
        border: 2px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 15px var(--card-glow, var(--glow-default));
        position: relative;
        transition: transform 0.8s ease;
      }

      .save-card:hover .disc-visual {
        transform: rotate(180deg);
      }

      .disc-visual::after {
        content: "";
        width: 14px;
        height: 14px;
        background: var(--bg-space);
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      /* Regional Badge */
      .region-badge {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 4px 10px;
        border-radius: 30px;
        text-transform: uppercase;
        border: 1px solid currentColor;
        box-shadow: 0 0 8px currentColor;
      }

      .region-ntsc-u {
        color: #ff3366;
        background: rgba(255, 51, 102, 0.1);
      }

      .region-pal {
        color: #39ff14;
        background: rgba(57, 255, 20, 0.1);
      }

      .region-ntsc-j {
        color: #00f2fe;
        background: rgba(0, 242, 254, 0.1);
      }

      .region-unknown {
        color: var(--text-secondary);
        background: rgba(156, 163, 175, 0.1);
      }

      .game-title-container {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        margin-bottom: 20px;
      }

      .game-title {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.15rem;
        font-weight: 600;
        line-height: 1.4;
        color: var(--text-primary);
        margin-bottom: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        word-break: break-word;
      }

      .folder-name {
        font-size: 0.8rem;
        color: var(--text-secondary);
        font-weight: 400;
        letter-spacing: 0.02em;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 15px;
        font-size: 0.78rem;
        color: var(--text-secondary);
      }

      .card-footer-item {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .card-footer-item span:first-child {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.6;
      }

      .card-footer-item span:last-child {
        font-weight: 500;
        color: var(--text-primary);
      }

      .block-pill {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        color: var(--accent-cyan);
      }

      /* Premium Dialog Modal */
      dialog {
        border: none;
        border-radius: 28px;
        background: transparent;
        max-width: 650px;
        width: 90%;
        margin: auto;
        padding: 0;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        outline: none;
        overflow: hidden;
      }

      dialog::backdrop {
        background: rgba(4, 5, 12, 0.85);
        backdrop-filter: blur(12px);
        animation: fadeIn 0.4s ease;
      }

      .dialog-content {
        background: #0c0d1e;
        border: 1px solid var(--panel-border-hover);
        border-radius: 28px;
        padding: 30px;
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        gap: 25px;
        position: relative;
        box-shadow: 0 0 40px var(--dialog-glow, rgba(0, 242, 254, 0.1));
        overflow: hidden;
        animation: slideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      /* Glowing Dialog Accent */
      .dialog-content::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--accent-blue), var(--dialog-accent, var(--accent-cyan)));
      }

      .dialog-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .dialog-header-text h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.3;
        margin-bottom: 6px;
      }

      .dialog-header-text p {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .close-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: all 0.2s ease;
      }

      .close-btn:hover {
        background: rgba(255, 51, 102, 0.15);
        border-color: rgba(255, 51, 102, 0.3);
        color: #ff3366;
      }

      .dialog-stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .dialog-stat-box {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .dialog-stat-box span:first-child {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .dialog-stat-box span:last-child {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .files-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .files-section h4 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent-cyan);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 8px;
      }

      /* Custom scrollbar on files list */
      .files-list-container {
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.2);
      }

      .files-list-container::-webkit-scrollbar {
        width: 6px;
      }

      .files-list-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }

      .files-list-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      .files-list-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .files-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.82rem;
      }

      .files-table th {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-secondary);
        padding: 10px 15px;
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        background: rgba(255, 255, 255, 0.02);
      }

      .files-table td {
        padding: 12px 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        color: var(--text-primary);
        font-weight: 300;
      }

      .files-table tr:hover td {
        background: rgba(255, 255, 255, 0.01);
      }

      .file-type-icon {
        margin-right: 8px;
        font-size: 0.95rem;
      }

      input[type="file"] {
        display: none;
      }

      /* Animations */
      @keyframes pulseGlow {
        0%, 100% {
          filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
        }
        50% {
          filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.6));
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slideUp {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
        font-weight: 300;
        font-size: 1.1rem;
        background: var(--panel-glass);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div id="ui-container">
      <header>
        <h1><span class="controller-icon">🎮</span> PS2 Memory Card Visualizer</h1>
        <p>Upload mcd001.ps2 or mcd002.ps2 files to inspect and explore your game saves with accurate titles and properties.</p>
      </header>

      <label class="upload-zone" id="drop-zone">
        <span class="upload-icon">💾</span>
        <h3>Click or Drag & Drop Memory Card File</h3>
        <p>Supports standard 512-byte RAW format (.raw, .ps2) or 528-byte ADX-spare formats (8.25MB)</p>
        <input type="file" id="file-input" accept=".ps2,.raw" />
      </label>

      <div id="dashboard-anchor"></div>
      <div id="browser-anchor">
        <div class="empty-state">
          No memory card loaded. Drag a card file above to start.
        </div>
      </div>
    </div>

    <!-- Details Dialog Modal -->
    <dialog id="save-dialog">
      <div class="dialog-content" id="dialog-inner">
        <!-- Rendered dynamically -->
      </div>
    </dialog>

        "SLES-51008": "Kingdom Hearts",
        "SLES-51569": "Prince of Persia: The Sands of Time",
        "SLES-52585": "Burnout 3: Takedown",
        "SLES-52887": "Shadow of the Colossus",
        "SLES-54354": "Final Fantasy XII",
        "SLES-82028": "Metal Gear Solid 2: Sons of Liberty",
        "SLES-82013": "Devil May Cry",
        // NTSC-J (Japan)
        "SLPS-25001": "Ridge Racer V",
        "SLPS-25050": "Dark Cloud",
        "SLPS-25100": "Final Fantasy X",
        "SLPS-25198": "Kingdom Hearts",
        "SLPS-25302": "Final Fantasy X-2",
        "SLPS-25489": "Dragon Quest VIII",
        "SLPS-25513": "Kingdom Hearts II",
        "SLPS-73205": "Persona 4",
        "SLPM-55052": "Katamari Damacy",
        "SLPM-65589": "Metal Gear Solid 3: Snake Eater",
        "SLPM-66221": "Okami",
        "SCPS-11001": "Gran Turismo 3: A-Spec",
        "SCPS-15012": "Ico",
        "SCPS-15018": "Shadow of the Colossus",
        "SCPS-15014": "Jak and Daxter",
        "PAPX-90201": "Ridge Racer V (Demo)",
      };

      /**
       * Extracts a product code from a PS2 save folder name.
       * e.g. "BASLUS-20326-SET0001" → "SLUS-20326"
       *      "BESLES-50435naaproia" → "SLES-50435"
       *      "BASCUS-97124AYBABTU!" → "SCUS-97124"
       */
      function extractProductCode(folderName) {
        // Common patterns:
        //   BA + SLUS-XXXXX  (NTSC-U game save)
        //   BE + SCES-XXXXX  (PAL game save)
        //   BI + SLPS-XXXXX  (NTSC-J game save)
        // The prefix is 2 chars (BA/BE/BI) then the standard code follows
        const m = folderName.match(/^B[A-Z]([A-Z]{4}-\d{5})/i);
        if (m) return m[1].toUpperCase();
        // Also try without the B prefix for raw codes
        const m2 = folderName.match(/^([A-Z]{4}-\d{5})/i);
        if (m2) return m2[1].toUpperCase();
        return null;
      }

      function lookupGameTitle(folderName) {
        const code = extractProductCode(folderName);
        if (code && PS2_GAME_DB[code]) {
          return PS2_GAME_DB[code];
        }
        return null;
      }

      const fileInput = document.getElementById("file-input");
      const dropZone = document.getElementById("drop-zone");
      const dashboardAnchor = document.getElementById("dashboard-anchor");
      const browserAnchor = document.getElementById("browser-anchor");
      const saveDialog = document.getElementById("save-dialog");

      // Set up drag and drop helpers
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "var(--accent-cyan)";
        dropZone.style.background = "rgba(0, 242, 254, 0.05)";
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.style.borderColor = "rgba(0, 242, 254, 0.3)";
        dropZone.style.background = "rgba(255, 255, 255, 0.01)";
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "rgba(0, 242, 254, 0.3)";
        dropZone.style.background = "rgba(255, 255, 255, 0.01)";
        
        const files = e.dataTransfer.files;
        if (files.length) {
          fileInput.files = files;
          handleFile(files[0]);
        }
      });

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
      });

      // Handle Dialog Close on Outer Click
      saveDialog.addEventListener("click", (e) => {
        const dialogDimensions = saveDialog.getBoundingClientRect();
        if (
          e.clientX < dialogDimensions.left ||
          e.clientX > dialogDimensions.right ||
          e.clientY < dialogDimensions.top ||
          e.clientY > dialogDimensions.bottom
        ) {
          saveDialog.close();
        }
      });

      // Hashing function to map folder name to a unique, consistent glow color
      function getGlowColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue = Math.abs(hash) % 360;
        return `hsl(${hue}, 85%, 55%)`;
      }

      // Main File Handler
      async function handleFile(file) {
        try {
          const originalBuffer = await file.arrayBuffer();
          let buffer = originalBuffer;

          let isSpareStripped = false;
          // If page length size is multiple of 528 (raw with 16 byte spares)
          if (originalBuffer.byteLength % 528 === 0) {
            const numPages = originalBuffer.byteLength / 528;
            const cleanBuffer = new ArrayBuffer(numPages * 512);
            const cleanView = new Uint8Array(cleanBuffer);
            const origView = new Uint8Array(originalBuffer);
            
            for (let p = 0; p < numPages; p++) {
              const src = p * 528;
              const dst = p * 512;
              for (let i = 0; i < 512; i++) {
                cleanView[dst + i] = origView[src + i];
              }
            }
            buffer = cleanBuffer;
            isSpareStripped = true;
          }

          const data = new DataView(buffer);

          // 1. Superblock Parsing
          const magicBytes = [];
          for (let i = 0; i < 28; i++) {
            magicBytes.push(data.getUint8(i));
          }
          const magic = String.fromCharCode(...magicBytes);
          if (!magic.startsWith("Sony PS2 Memory Card Format")) {
            throw new Error("Invalid memory card format magic string.");
          }

          const pageSize = data.getUint16(40, true);
          const pagesPerCluster = data.getUint16(42, true);
          const clusterSize = pageSize * pagesPerCluster;
          const clustersPerCard = data.getUint32(48, true);
          const allocOffset = data.getUint32(52, true);
          const rootDirCluster = data.getUint32(60, true);

          // Build IFC list (starts at offset 80)
          const ifcList = [];
          for (let j = 0; j < 32; j++) {
            ifcList.push(data.getUint32(80 + j * 4, true));
          }

          // Build global list of FAT clusters
          const numFatClusters = Math.ceil(clustersPerCard * 4 / clusterSize);
          const ifcCluster = ifcList[0];
          const ifcOffset = ifcCluster * pagesPerCluster * pageSize;
          const fatClusters = [];
          for (let j = 0; j < numFatClusters; j++) {
            fatClusters.push(data.getUint32(ifcOffset + j * 4, true));
          }

          // Helper to get FAT next cluster chain
          function getClusterChain(startCluster) {
            const chain = [];
            let current = startCluster;
            const visited = new Set();
            while (
              current !== 0xFFFFFFFF && 
              (current & 0x7FFFFFFF) !== 0x7FFFFFFF
            ) {
              if (visited.has(current)) break;
              visited.add(current);
              chain.push(current);

              const fatIndex = Math.floor(current / 256);
              if (fatIndex >= fatClusters.length) break;
              const fatCluster = fatClusters[fatIndex];
              const entryOffset = fatCluster * pagesPerCluster * pageSize + (current % 256) * 4;

              if (entryOffset + 4 > buffer.byteLength) break;
              const entry = data.getUint32(entryOffset, true);

              // Stop if the cluster is unallocated (MSB is clear)
              if ((entry & 0x80000000) === 0) {
                break;
              }

              const next = entry & 0x7FFFFFFF;
              if (next === 0x7FFFFFFF || entry === 0xFFFFFFFF) {
                break;
              }
              current = next;
            }
            return chain;
          }

          // Helper to read all file contents from cluster chain
          function readFileBytes(startCluster, fileLength) {
            const chain = getClusterChain(startCluster);
            const fileBytes = new Uint8Array(fileLength);
            let bytesCopied = 0;

            for (const c of chain) {
              if (bytesCopied >= fileLength) break;
              const clusterOffset = (allocOffset + c) * pagesPerCluster * pageSize;
              const bytesToCopy = Math.min(clusterSize, fileLength - bytesCopied);
              
              for (let i = 0; i < bytesToCopy; i++) {
                fileBytes[bytesCopied + i] = data.getUint8(clusterOffset + i);
              }
              bytesCopied += bytesToCopy;
            }
            return fileBytes;
          }

          // Helper to read directory entries.
          // For the root directory, the "." entry's length field = entry count.
          // For subdirectories, the "." entry's length is 0; use parentEntryCount instead.
          function readDirectoryEntries(startCluster, parentEntryCount) {
            const chain = getClusterChain(startCluster);
            const entries = [];
            if (chain.length === 0) return entries;

            const firstOffset = (allocOffset + chain[0]) * pagesPerCluster * pageSize;
            const dotMode = data.getUint16(firstOffset, true);
            if ((dotMode & 0x8000) === 0) return entries;

            // Use "." entry's length for root, but parent's length for subdirectories
            const dotLength = data.getUint32(firstOffset + 4, true);
            const totalEntries = (dotLength > 0) ? dotLength : (parentEntryCount || 0);
            if (totalEntries === 0) return entries;

            let entryCount = 0;

            for (const c of chain) {
              if (entryCount >= totalEntries) break;
              const clusterOffset = (allocOffset + c) * pagesPerCluster * pageSize;
              const entriesInCluster = clusterSize / 512;

              for (let e = 0; e < entriesInCluster; e++) {
                if (entryCount >= totalEntries) break;
                const entryOffset = clusterOffset + e * 512;
                entryCount++;

                const mode = data.getUint16(entryOffset, true);
                if ((mode & 0x8000) === 0) continue; // Skip unallocated

                const length = data.getUint32(entryOffset + 4, true);
                const entryCluster = data.getUint32(entryOffset + 16, true);

                // Date at offset 8 (creation) and offset 24 (modification)
                // Modification date: sec@24+1, min@24+2, hour@24+3, day@24+4, month@24+5, year@24+6
                const sec = data.getUint8(entryOffset + 25);
                const min = data.getUint8(entryOffset + 26);
                const hour = data.getUint8(entryOffset + 27);
                const day = data.getUint8(entryOffset + 28);
                const month = data.getUint8(entryOffset + 29);
                const year = data.getUint16(entryOffset + 30, true);

                // Name at offset 0x40 (64)
                let name = "";
                for (let n = 0; n < 32; n++) {
                  const charCode = data.getUint8(entryOffset + 64 + n);
                  if (charCode === 0) break;
                  name += String.fromCharCode(charCode);
                }

                entries.push({
                  mode,
                  isDir: (mode & 0x0020) !== 0,
                  isFile: (mode & 0x0010) !== 0,
                  length,
                  cluster: entryCluster,
                  name,
                  modified: { year, month, day, hour, min, sec }
                });
              }
            }
            return entries;
          }

          // Calculate Allocated/Used clusters across card
          let allocatedClusters = 0;
          for (let c = 0; c < clustersPerCard; c++) {
            const fatIndex = Math.floor(c / 256);
            const fatCluster = fatClusters[fatIndex];
            const entryOffset = fatCluster * pagesPerCluster * pageSize + (c % 256) * 4;
            const entry = data.getUint32(entryOffset, true);
            if ((entry & 0x80000000) !== 0) {
              allocatedClusters++;
            }
          }

          // Read root directory entries
          const rootEntries = readDirectoryEntries(rootDirCluster);
          const saves = [];

          for (const entry of rootEntries) {
            // Filter directories and skip "." and ".." and "Your System Configuration"
            if (
              entry.isDir && 
              entry.name !== "." && 
              entry.name !== ".." && 
              entry.name !== "Your System Configuration"
            ) {
              // Read subfiles: pass parent entry.length as expected entry count
              const files = readDirectoryEntries(entry.cluster, entry.length);
              
              let totalBytes = 0;
              let iconSysFile = null;
              
              for (const file of files) {
                if (file.isFile) {
                  totalBytes += file.length;
                  if (file.name.toLowerCase() === "icon.sys") {
                    iconSysFile = file;
                  }
                }
              }

              // Title resolution priority:
              // 1. PS2 game code database lookup
              // 2. icon.sys Shift-JIS decoded title
              // 3. Raw folder name fallback
              let decodedTitle = null;
              let iconSysTitle = null;
              
              // Always try to read icon.sys title
              if (iconSysFile) {
                const iconBytes = readFileBytes(iconSysFile.cluster, iconSysFile.length);
                if (iconBytes.byteLength >= 192 + 68) {
                  const titleBytes = iconBytes.subarray(192, 192 + 68);
                  const nullIndex = titleBytes.indexOf(0);
                  const cleanBytes = nullIndex === -1 ? titleBytes : titleBytes.subarray(0, nullIndex);
                  
                  try {
                    const decoder = new TextDecoder("shift-jis");
                    const gameTitle = decoder.decode(cleanBytes).trim();
                    if (gameTitle) {
                      iconSysTitle = gameTitle.replace(/[\r\n]+/g, " ").replace(/\s+/g, " ");
                    }
                  } catch (e) {
                    console.error("Shift-JIS title decoding failed:", e);
                  }
                }
              }
              
              // Try game code database first
              const dbTitle = lookupGameTitle(entry.name);
              if (dbTitle) {
                decodedTitle = dbTitle;
              } else if (iconSysTitle) {
                decodedTitle = iconSysTitle;
              }
              
              // Fallback to folder name
              if (!decodedTitle) {
                decodedTitle = entry.name;
              }
              
              // Extract product code for display
              const productCode = extractProductCode(entry.name);

              // Detect Region
              let region = "NTSC-U";
              let regionDesc = "NTSC-U (North America)";
              const upperFolder = entry.name.toUpperCase();
              if (upperFolder.includes("SLUS") || upperFolder.includes("SCUS") || upperFolder.startsWith("BAS")) {
                region = "NTSC-U";
                regionDesc = "NTSC-U (North America)";
              } else if (upperFolder.includes("SLES") || upperFolder.includes("SCES") || upperFolder.startsWith("BES")) {
                region = "PAL";
                regionDesc = "PAL (Europe)";
              } else if (upperFolder.includes("SLPS") || upperFolder.includes("SLPM") || upperFolder.includes("SCPS") || upperFolder.startsWith("BIS")) {
                region = "NTSC-J";
                regionDesc = "NTSC-J (Japan)";
              } else if (upperFolder.includes("SLAJ") || upperFolder.includes("SCCS")) {
                region = "NTSC-Asia";
                regionDesc = "NTSC-Asia / Korea";
              } else {
                region = "Unknown";
                regionDesc = "Unknown Region";
              }

              saves.push({
                folderName: entry.name,
                title: decodedTitle,
                iconTitle: iconSysTitle, // save-specific title from icon.sys (may differ from DB game title)
                productCode,
                sizeBytes: totalBytes,
                modified: entry.modified,
                region,
                regionDesc,
                startCluster: entry.cluster,
                files: files.filter(f => f.name !== "." && f.name !== "..")
              });
            }
          }

          // Update Dashboard
          const usedKB = (allocatedClusters * clusterSize / 1024).toFixed(0);
          const totalKB = (clustersPerCard * clusterSize / 1024).toFixed(0);
          const usedPercent = ((allocatedClusters / clustersPerCard) * 100).toFixed(1);
          
          dashboardAnchor.innerHTML = `
            <div class="card-dashboard">
              <div class="stat-card">
                <div class="stat-label">Card Capacity</div>
                <div class="stat-value">${(totalKB / 1024).toFixed(0)} MB</div>
                <div class="stat-detail">${clustersPerCard} clusters of ${clusterSize} bytes</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Used Space</div>
                <div class="stat-value">${(usedKB / 1024).toFixed(2)} MB</div>
                <div class="stat-detail">${allocatedClusters} active clusters (${usedPercent}%)</div>
                <div class="progress-container">
                  <div class="progress-bar" style="width: ${usedPercent}%"></div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Save Profiles</div>
                <div class="stat-value">${saves.length} Games</div>
                <div class="stat-detail">${isSpareStripped ? "Page spare bytes stripped" : "Flat RAW format"}</div>
              </div>
            </div>
          `;

          // Render Saves Grid
          if (saves.length === 0) {
            browserAnchor.innerHTML = `
              <div class="empty-state">
                The memory card is empty or contains no valid game directories.
              </div>
            `;
            return;
          }

          browserAnchor.innerHTML = "";
          const browserGrid = document.createElement("div");
          browserGrid.className = "card-browser";

          saves.forEach((save) => {
            const glowColor = getGlowColor(save.folderName);
            const sizeKB = (save.sizeBytes / 1024).toFixed(1);
            
            // Format dates neatly
            const pad = (n) => String(n).padStart(2, "0");
            const dateStr = `${save.modified.year}-${pad(save.modified.month)}-${pad(save.modified.day)} ${pad(save.modified.hour)}:${pad(save.modified.min)}`;

            const card = document.createElement("div");
            card.className = "save-card";
            card.style.setProperty("--card-glow", glowColor);
            card.style.setProperty("--card-glow-alpha", glowColor.replace("55%)", "55%, 0.2)"));

            // Regional Badge Class
            let badgeClass = "region-unknown";
            if (save.region === "NTSC-U") badgeClass = "region-ntsc-u";
            else if (save.region === "PAL") badgeClass = "region-pal";
            else if (save.region === "NTSC-J") badgeClass = "region-ntsc-j";

            card.innerHTML = `
              <div>
                <div class="card-header-visual">
                  <div class="disc-visual"></div>
                  <span class="region-badge ${badgeClass}">${save.region}</span>
                </div>
                
                <div class="game-title-container">
                  <div class="game-title" title="${save.title}">${save.title}</div>
                  <div class="folder-name">${save.productCode ? save.productCode : ''} ${save.productCode ? '·' : ''} ${save.folderName}</div>
                </div>
              </div>

              <div class="card-footer">
                <div class="card-footer-item">
                  <span>Last Saved</span>
                  <span>${dateStr}</span>
                </div>
                <div class="card-footer-item" style="text-align: right;">
                  <span>Blocks / Size</span>
                  <span><span class="block-pill">${Math.ceil(sizeKB / 8)} BLK</span> ${sizeKB} KB</span>
                </div>
              </div>
            `;

            // Open popup dialog when clicked
            card.addEventListener("click", () => {
              openSaveDetails(save);
            });

            browserGrid.appendChild(card);
          });

          browserAnchor.appendChild(browserGrid);

        } catch (error) {
          alert(`Error reading memory card: ${error.message}`);
          console.error(error);
        }
      }

      // Dialog Modal Populator
      function openSaveDetails(save) {
        const dialogInner = document.getElementById("dialog-inner");
        const glowColor = getGlowColor(save.folderName);
        
        saveDialog.style.setProperty("--dialog-glow", glowColor.replace("55%)", "55%, 0.15)"));
        saveDialog.style.setProperty("--dialog-accent", glowColor);

        const pad = (n) => String(n).padStart(2, "0");
        const dateStr = `${save.modified.year}-${pad(save.modified.month)}-${pad(save.modified.day)} ${pad(save.modified.hour)}:${pad(save.modified.min)}:${pad(save.modified.sec)}`;
        const sizeKB = (save.sizeBytes / 1024).toFixed(1);

        // Build file rows
        let fileRows = "";
        save.files.forEach(f => {
          let fileIcon = "📄";
          if (f.isDir) fileIcon = "📁";
          else if (f.name.toLowerCase() === "icon.sys") fileIcon = "⚙️";
          else if (f.name.toLowerCase().endsWith(".ico")) fileIcon = "🎭";
          
          const fileDateStr = `${f.modified.year}-${pad(f.modified.month)}-${pad(f.modified.day)} ${pad(f.modified.hour)}:${pad(f.modified.min)}`;
          
          fileRows += `
            <tr>
              <td><span class="file-type-icon">${fileIcon}</span>${f.name}</td>
              <td style="text-align: right; font-family: 'Space Grotesk', sans-serif;">${(f.length / 1024).toFixed(2)} KB</td>
              <td style="color: var(--text-secondary); text-align: right;">${fileDateStr}</td>
            </tr>
          `;
        });

        if (save.files.length === 0) {
          fileRows = `<tr><td colspan="3" style="text-align: center; color: var(--text-secondary);">No files found in directory</td></tr>`;
        }

        dialogInner.innerHTML = `
          <div class="dialog-header">
            <div class="dialog-header-text">
              <h2>${save.title}</h2>
              <p>${save.productCode ? save.productCode + ' · ' : ''}${save.folderName} · ${save.regionDesc}</p>
            </div>
            <button class="close-btn" id="close-modal-btn">&times;</button>
          </div>

          <div class="dialog-stats-grid">
            <div class="dialog-stat-box">
              <span>Memory Size</span>
              <span>${sizeKB} KB (${Math.ceil(sizeKB / 8)} Blocks)</span>
            </div>
            <div class="dialog-stat-box">
              <span>Last Modified</span>
              <span>${dateStr}</span>
            </div>
            <div class="dialog-stat-box">
              <span>Start Cluster</span>
              <span>Cluster ${save.startCluster}</span>
            </div>
            <div class="dialog-stat-box">
              <span>Region Format</span>
              <span>${save.region}</span>
            </div>
          </div>

          <div class="files-section">
            <h4>Directory Files (${save.files.length})</h4>
            <div class="files-list-container">
              <table class="files-table">
                <thead>
                  <tr>
                    <th>Filename</th>
                    <th style="text-align: right;">Size</th>
                    <th style="text-align: right;">Modified Date</th>
                  </tr>
                </thead>
                <tbody>
                  ${fileRows}
                </tbody>
              </table>
            </div>
          </div>
        `;

        document.getElementById("close-modal-btn").addEventListener("click", () => {
          saveDialog.close();
        });

        saveDialog.showModal();
      }
    </script>
  </body>
</html>
